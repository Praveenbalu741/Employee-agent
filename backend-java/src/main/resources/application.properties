server.port=5000

# H2 Database Config
spring.datasource.url=jdbc:h2:file:./data/feedbackdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Enable H2 Console for debugging purposes
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configurations
jwt.secret=9a4f2c8d3b7e6f1a8c5d9e3b2a7c4f1e5d9c8b3a7f2e1a5c8d9b2e7f4a1c3d5e
jwt.refreshSecret=3d5e2c1a8c5f9e3b7a4f2d8b1e7c5d9b2e7f4a1c8d9a4f2c8d3b7e6f1a8c5d
jwt.expiration=900000
jwt.refreshExpiration=604800000

# Anthropic Claude Configuration
anthropic.api.key=your_anthropic_api_key_here

# Mail configurations
spring.mail.host=smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=your_mailtrap_user
spring.mail.password=your_mailtrap_pass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=noreply@employeefeedback.com
